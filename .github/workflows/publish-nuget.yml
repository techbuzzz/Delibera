name: publish-nuget

on:
  push:
    branches: [ main ]
    tags:    [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_NOLOGO:                     'true'
  DOTNET_CLI_TELEMETRY_OPTOUT:       'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  NUGET_PACKAGES:                    ${{ github.workspace }}/.nuget-packages

jobs:
  build:
    name: build & pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Delibera.slnx

      - name: Build (Release)
        run: dotnet build src/Delibera.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack src/Delibera.Core/Delibera.Core.csproj -c Release --no-build --output ./artifacts

      - name: Verify package layout (hash, no signature)
        run: |
          # Sanity-check the package: list contents and validate hash integrity.
          # We do NOT run `dotnet nuget verify` because it requires a code
          # signing certificate (NU3004) — overkill for an OSS package.
          ls -la ./artifacts
          for pkg in ./artifacts/Delibera.Core.*.nupkg; do
            echo "── $pkg ──"
            dotnet package list "$pkg" || true
            unzip -l "$pkg"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-artifacts
          path: ./artifacts/*.nupkg
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish to NuGet.org
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC): GitHub issues a short-lived token bound to
    # this workflow; nuget.org validates it against the trusted publishing
    # policy configured on https://www.nuget.org and returns a temporary
    # API key (valid for ~1 hour). No NUGET_API_KEY secret required.
    permissions:
      id-token: write   # required for OIDC token issuance
      contents: read
    environment:
      name: nuget-prod
      url: https://www.nuget.org/packages/Delibera.Core
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-artifacts
          path: ./artifacts

      - name: NuGet login (OIDC → short-lived API key)
        id: login
        uses: NuGet/login@v1
        with:
          # Use your nuget.org profile name (case-insensitive). DO NOT use email.
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          for pkg in ./artifacts/*.nupkg; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
              --skip-duplicate
          done
