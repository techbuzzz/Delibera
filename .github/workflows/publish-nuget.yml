name: publish-nuget

on:
  push:
    branches: [ main ]
    tags:    [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_NOLOGO:                     'true'
  DOTNET_CLI_TELEMETRY_OPTOUT:       'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  NUGET_PACKAGES:                    ${{ github.workspace }}/.nuget-packages

jobs:
  build:
    name: build & pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Delibera.slnx

      - name: Build (Release)
        run: dotnet build src/Delibera.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack src/Delibera.Core/Delibera.Core.csproj -c Release --no-build --output ./artifacts

      - name: Verify package
        run: |
          ls -la ./artifacts
          dotnet nuget verify ./artifacts/Delibera.Core.*.nupkg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-artifacts
          path: ./artifacts/*.nupkg
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish to NuGet.org
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-artifacts
          path: ./artifacts

      - name: Push to NuGet.org
        run: |
          for pkg in ./artifacts/*.nupkg; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --skip-duplicate
          done
