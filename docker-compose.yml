  qdrant:
    image: qdrant/qdrant:latest
    container_name: delibera-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: delibera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: council_vectors
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d council_vectors"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  # ollama-data:
  qdrant-data:
  postgres-data:
